# Catálogo de Indicaciones Terapéuticas y Dianas Científicas (DrugAgent-Local)
# Este catálogo contiene las dianas farmacológicas legítimas configuradas con sus respectivos
# identificadores PDB, descriptores clínicos, avisos legales (disclaimers) y coordenadas de docking.

oncology_lung_egfr:
  display_name: "Oncología: Cáncer de Pulmón (NSCLC) - Inhibición de EGFR"
  target: "EGFR"
  pdb_id: "4HJO"
  receptor_path: "data/receptors/4HJO_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Esta simulación produce candidatos computacionales preliminares frente a EGFR (Cáncer de Pulmón). No representa indicación clínica ni de dosificación médica."
  docking_params:
    center_x: 21.0
    center_y: 11.5
    center_z: -0.5
    size_x: 20.0
    size_y: 20.0
    size_z: 20.0
  planner_prompt: "Focus on designing molecules that act as EGFR tyrosine kinase inhibitors, matching a pharmacophore with hydrogen-bond donors/acceptors for the hinge region (Met793) and hydrophobic chains to fit the pocket."

metabolic_diabetes_dpp4:
  display_name: "Metabólica: Diabetes Tipo 2 - Inhibición de DPP-4"
  target: "DPP4"
  pdb_id: "3HAJ"
  receptor_path: "data/receptors/3HAJ_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Esta simulación estima afinidad frente a DPP-4 para Diabetes Tipo 2. Todos los hits son meramente experimentales en fase silico."
  docking_params:
    center_x: 39.5
    center_y: 50.1
    center_z: 32.8
    size_x: 18.0
    size_y: 18.0
    size_z: 18.0
  planner_prompt: "Focus on designing compounds that mimic DPP-4 inhibitors (gliptins) featuring an amino group that interacts with the active site Glu205/Glu206 and a hydrophobic group to occupy the S1 pocket."

infectious_covid_mpro:
  display_name: "Infecciosas: SARS-CoV-2 Mpro proteasa - Inhibición de Proteasa"
  target: "MPRO"
  pdb_id: "6LU7"
  receptor_path: "data/receptors/6LU7_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación computacional de unión frente a la proteasa principal (Mpro) de SARS-CoV-2. Los resultados requieren validación experimental in vitro."
  docking_params:
    center_x: -10.5
    center_y: 12.3
    center_z: 68.0
    size_x: 22.0
    size_y: 22.0
    size_z: 22.0
  planner_prompt: "Focus on designing peptidomimetic or non-peptidyl inhibitors targeting the catalytic dyad (Cys145 and His41) of the SARS-CoV-2 main protease (Mpro)."

# ── Virus de alta prioridad en I+D global (PDB + caja desde ligando nativo o proteína) ─────────────
# DrugAgent NO consulta bases regulatorias en vivo: el estado de vacunas/antivirales aprobados cambia.
# Estas misiones son simulación computacional de unión a un blanco estructural público, no “cura” clínica.

infectious_dengue_ns3:
  display_name: "Infecciosas: Virus del dengue — NS3 proteasa (I+D antiviral in silico)"
  target: "DENV_NS3"
  pdb_id: "2M9P"
  receptor_path: "data/receptors/2M9P_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación in silico frente a NS3 proteasa del dengue (PDB 2M9P, estructura NMR con ligando). No indica ausencia de vacunas o políticas de salud pública; no sustituye decisiones clínicas. Solo investigación computacional preclínica."
  docking_params:
    center_x: 10.96
    center_y: 6.06
    center_z: 10.08
    size_x: 22.0
    size_y: 20.5
    size_z: 25.0
  planner_prompt: "Design competitive inhibitors of dengue NS3 protease active site as defined by the co-crystal/NMR ligand environment; balance protease selectivity vs human proteases and drug-like properties."

infectious_zika_ns2b_ns3:
  display_name: "Infecciosas: Virus Zika — NS2B-NS3 proteasa (I+D antiviral)"
  target: "ZIKV_NS3"
  pdb_id: "7VLI"
  receptor_path: "data/receptors/7VLI_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación in silico frente a NS2B-NS3 de Zika (PDB 7VLI con ligando de referencia). No es vacuna ni terapia aprobada; validación experimental obligatoria."
  docking_params:
    center_x: -5.42
    center_y: 5.26
    center_z: -14.99
    size_x: 18.0
    size_y: 18.0
    size_z: 21.0
  planner_prompt: "Design competitive inhibitors of Zika NS2B-NS3 protease pocket occupied by the co-crystal ligand; optimize for selectivity vs host proteases and favorable ADMET."

infectious_rsv_fusion:
  display_name: "Infecciosas: VRS (RSV) — Proteína F (fusion), sitio con ligando pequeño (I+D)"
  target: "RSV_F"
  pdb_id: "5C6B"
  receptor_path: "data/receptors/5C6B_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación in silico en sitio definido por HETATM del PDB 5C6B (RSV F). Existen biológicos aprobados para algunas poblaciones; este pipeline no los modela. Solo candidatos computacionales."
  docking_params:
    center_x: 42.59
    center_y: 18.6
    center_z: 25.97
    size_x: 16.0
    size_y: 16.0
    size_z: 16.0
  planner_prompt: "Design small-molecule fusion inhibitors or entry blockers consistent with the pocket geometry near the co-crystal ligand; consider prefusion vs postfusion state limitations of a single PDB."

oncology_kras_g12c:
  display_name: "Oncología: KRAS G12C — inhibidores covalentes (I+D in silico)"
  target: "KRAS"
  pdb_id: "6VXX"
  receptor_path: "data/receptors/6VXX_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación frente a KRAS G12C (PDB 6VXX). No sustituye ensayos celulares ni decisiones clínicas; mutación G12D requiere otro contexto estructural."
  docking_params:
    center_x: 10.5
    center_y: 12.0
    center_z: 5.0
    size_x: 22.0
    size_y: 22.0
    size_z: 22.0
  planner_prompt: "Design covalent or switch-II pocket inhibitors consistent with KRAS G12C structural biology; prioritize drug-like warheads and selectivity vs wild-type KRAS."

oncology_pd_l1:
  display_name: "Oncología: PD-L1 (CD274) — inhibidores de interacción inmune (I+D in silico)"
  target: "PD_L1"
  pdb_id: "3K33"
  receptor_path: "data/receptors/3K33_receptor.pdbqt"
  disclaimer: "ADVERTENCIA: Simulación in silico en PD-L1 (PDB 3K33). Muchos fármacos aprobados son anticuerpos; los hits aquí son small-molecule computacionales."
  docking_params:
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
    size_x: 20.0
    size_y: 20.0
    size_z: 20.0
  planner_prompt: "Design small molecules that may modulate the PD-L1 surface pocket or adjacent grooves; note assay context (protein-protein vs direct binding) when interpreting scores."

# ── Nuevos targets de alta relevancia clínica ────────────────────────────────

oncology_abl1:
  display_name: "Oncología: BCR-ABL1 — Leucemia Mieloide Crónica (CML)"
  target: "ABL1"
  pdb_id: "1IEP"
  receptor_path: "data/receptors/1IEP_receptor.pdbqt"
  disclaimer: "Simulación in silico frente a ABL1 (PDB 1IEP, imatinib-bound). Los hits son candidatos computacionales; la selectividad vs kinoma requiere validación experimental."
  docking_params:
    center_x: 15.77
    center_y: 36.80
    center_z: 28.50
    size_x: 22.0
    size_y: 22.0
    size_z: 22.0
  planner_prompt: "Design type-I or type-II ABL1 kinase inhibitors; prioritize molecules that occupy the ATP binding site and the adjacent allosteric pocket, considering resistance mutations (T315I gatekeeper). Reference: imatinib, dasatinib, nilotinib pharmacophores."

oncology_cdk2:
  display_name: "Oncología: CDK2 — Ciclo Celular, Tumores Sólidos"
  target: "CDK2"
  pdb_id: "1FIN"
  receptor_path: "data/receptors/1FIN_receptor.pdbqt"
  disclaimer: "Simulación in silico frente a CDK2 (PDB 1FIN). CDK2 comparte homología con CDK1/4/6; la selectividad requiere validación secundaria."
  docking_params:
    center_x: 22.50
    center_y: 23.10
    center_z: 30.40
    size_x: 20.0
    size_y: 20.0
    size_z: 20.0
  planner_prompt: "Design CDK2 inhibitors targeting the hinge region (Glu81/Leu83); optimize selectivity over CDK4/6 by exploiting differences in the P-loop and activation loop. Prioritize molecules with H-bond to backbone NH of Leu83."

oncology_braf:
  display_name: "Oncología: BRAF V600E — Melanoma, Cáncer de Tiroides"
  target: "BRAF"
  pdb_id: "4MNE"
  receptor_path: "data/receptors/4MNE_receptor.pdbqt"
  disclaimer: "Simulación frente a BRAF V600E (PDB 4MNE, vemurafenib). La mutación V600E crea el bolsillo DFG-out; los resultados no aplican a BRAF wt sin validación adicional."
  docking_params:
    center_x: -7.10
    center_y: -4.80
    center_z: 10.50
    size_x: 22.0
    size_y: 22.0
    size_z: 22.0
  planner_prompt: "Design BRAF V600E inhibitors targeting the DFG-out inactive conformation; prioritize type-II binding mode occupying the hydrophobic back pocket. Consider paradoxical activation risk for BRAF wt and optimize for mutant selectivity."

oncology_parp1:
  display_name: "Oncología: PARP1 — Cánceres BRCA1/2 (terapia sintética letal)"
  target: "PARP1"
  pdb_id: "3L3M"
  receptor_path: "data/receptors/3L3M_receptor.pdbqt"
  disclaimer: "Simulación frente a PARP1 (PDB 3L3M). Los hits son inhibidores computacionales in silico; la selectividad vs PARP2 y trapping vs catalytic-only requieren validación."
  docking_params:
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
    size_x: 25.0
    size_y: 25.0
    size_z: 25.0
  planner_prompt: "Design PARP1 inhibitors based on NAD+ binding site pharmacophore; key interactions: H-bond to Ser904 and Gly863, stacking with Tyr907. Consider nicotinamide mimetics, benzimidazoles, and phthalazinones as established scaffolds."

inflammatory_jak2:
  display_name: "Inflamatoria/Oncológica: JAK2 — Mielofibrosis, Artritis Reumatoide"
  target: "JAK2"
  pdb_id: "3E64"
  receptor_path: "data/receptors/3E64_receptor.pdbqt"
  disclaimer: "Simulación in silico frente a JAK2 (PDB 3E64). Selectividad vs JAK1/3/TYK2 crítica para reducir efectos adversos; requiere paneles cinómicos para validación."
  docking_params:
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
    size_x: 24.0
    size_y: 24.0
    size_z: 24.0
  planner_prompt: "Design JAK2 inhibitors for the ATP binding site; prioritize selectivity over JAK3 (different cysteine) and TYK2. Key residue: Leu932 gatekeeper. Consider pyrrolo-pyrimidines and oxazino-pyridines."

oncology_hdac_class1:
  display_name: "Oncología/Epigenética: HDAC1 — Inhibidores Epigenéticos"
  target: "HDAC1"
  pdb_id: "4BKX"
  receptor_path: "data/receptors/4BKX_receptor.pdbqt"
  disclaimer: "Simulación frente a HDAC1 (PDB 4BKX). La clase I HDAC (1/2/3/8) requiere selectividad vs clase II para reducir toxicidad cardiaca; validación en panel HDAC obligatoria."
  docking_params:
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
    size_x: 22.0
    size_y: 22.0
    size_z: 22.0
  planner_prompt: "Design HDAC1 inhibitors with zinc-chelating warhead (hydroxamic acid, benzamide, or thiol); optimize selectivity for class I vs II using cap group. Key: linker geometry to reach Zn2+ and surface recognition for isoform selectivity."

neuro_ache:
  display_name: "Neurológica: AChE — Alzheimer, Deterioro Cognitivo"
  target: "AChE"
  pdb_id: "1EVE"
  receptor_path: "data/receptors/1EVE_receptor.pdbqt"
  disclaimer: "Simulación frente a AChE de Torpedo californica (PDB 1EVE, donepezil-bound). Homología alta con AChE humana. Los hits son candidatos computacionales in silico."
  docking_params:
    center_x: 2.30
    center_y: 33.50
    center_z: 50.80
    size_x: 20.0
    size_y: 20.0
    size_z: 20.0
  planner_prompt: "Design AChE inhibitors that bridge the catalytic triad (Ser200) and peripheral anionic site (Trp286); optimize for dual binding site occupancy (gorge-spanning). Reference: donepezil, rivastigmine, galantamine pharmacophores. Consider hERG risk for CNS-active compounds."

infectious_hiv_integrase:
  display_name: "Infecciosas: VIH-1 Integrasa — INSTI (Anti-VIH)"
  target: "HIV1_INT"
  pdb_id: "3L2T"
  receptor_path: "data/receptors/3L2T_receptor.pdbqt"
  disclaimer: "Simulación frente a HIV-1 Integrasa (PDB 3L2T, complejo INSTI). Los hits son inhibidores computacionales de transferencia de cadena; resistencia R263K/N155H requiere análisis adicional."
  docking_params:
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
    size_x: 24.0
    size_y: 24.0
    size_z: 24.0
  planner_prompt: "Design HIV-1 integrase strand transfer inhibitors (INSTI); key: chelate Mg2+ cofactor with diketo acid or hydroxypyrimidinone motif, displacement of 3' processed viral DNA. Reference: raltegravir, elvitegravir, dolutegravir."
